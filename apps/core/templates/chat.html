<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <title>Сhat Bot</title>
    <style>
        body {
            background-color: #f8f9fa;
        }
        #chat-box {
            height: 400px;
            overflow-y: auto;
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #dee2e6;
            margin-bottom: 20px;
        }
        .msg-user {
            text-align: right;
            color: #0d6efd;
            margin-bottom: 5px;
        }
        .msg-bot {
            text-align: left;
            color: #212529;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="col-12 col-sm-8 col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header text-center bg-primary text-white">
                <h4 class="mb-0">Chat Bot</h4>
            </div>
            <div id="chat-box" class="card-body"></div>
            <div class="card-footer">
                <div class="mb-2">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="enableTTS">
                        <label class="form-check-label" for="enableTTS">
                            🔊 Озвучивать ответы (Silero TTS)
                        </label>
                    </div>
                </div>
                <div class="input-group">
                    <input id="msg" type="text" class="form-control" placeholder="Введите сообщение..." onkeydown="if(event.key==='Enter'){sendMsg();}">
                    <button class="btn btn-primary" onclick="sendMsg()">Отправить</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
const host = window.location.host;
let ws = new WebSocket(`${protocol}//${host}/ws/chat/`);
let currentBotMsgDiv = null;
let currentBotMsgRaw = "";
let audioQueue = [];
let isPlayingAudio = false;

ws.onmessage = function(event) {
    let data = JSON.parse(event.data);
    let chatBox = document.getElementById("chat-box");

    // Обработка аудио чанков
    if (data.audio_chunk) {
        audioQueue.push(data.audio_chunk);
        if (!isPlayingAudio) {
            playNextAudio();
        }
        return;
    }

    if (data.answer_chunk === "END_OF_ANSWER") {
        if (currentBotMsgDiv) {
            currentBotMsgDiv.innerHTML = "<strong>Bot:</strong> " + marked.parse(currentBotMsgRaw);
        }
        currentBotMsgDiv = null;
        currentBotMsgRaw = "";
        return;
    }

    if (!currentBotMsgDiv) {
        currentBotMsgDiv = document.createElement("div");
        currentBotMsgDiv.className = "msg-bot";
        currentBotMsgDiv.innerHTML = "<strong>Bot:</strong> ";
        chatBox.appendChild(currentBotMsgDiv);
    }

    currentBotMsgRaw += data.answer_chunk;
    currentBotMsgDiv.innerHTML = "<strong>Bot:</strong> " + marked.parse(currentBotMsgRaw);

    chatBox.scrollTop = chatBox.scrollHeight;
};

function playNextAudio() {
    if (audioQueue.length === 0) {
        isPlayingAudio = false;
        return;
    }
    
    isPlayingAudio = true;
    const audioBase64 = audioQueue.shift();
    const audio = new Audio(`data:audio/wav;base64,${audioBase64}`);
    
    audio.onended = function() {
        playNextAudio();
    };
    
    audio.onerror = function(e) {
        console.error('Ошибка воспроизведения аудио:', e);
        playNextAudio();
    };
    
    audio.play().catch(e => {
        console.error('Ошибка запуска аудио:', e);
        playNextAudio();
    });
}

function sendMsg() {
    let msgInput = document.getElementById("msg");
    let msg = msgInput.value.trim();
    if (!msg) return;
    
    let chatBox = document.getElementById("chat-box");
    chatBox.innerHTML += `<div class="msg-user"><strong>You:</strong> ${msg}</div>`;
    
    let enableTTS = document.getElementById("enableTTS").checked;
    ws.send(JSON.stringify({
        message: msg,
        enable_tts: enableTTS
    }));
    
    msgInput.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
    currentBotMsgDiv = null;
    currentBotMsgRaw = "";
}
</script>


</body>
</html>
