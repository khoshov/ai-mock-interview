<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <title>AI Mock Interview</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .interview-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
        }
        #chat-box {
            height: 500px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }
        .msg-user {
            background: #e3f2fd;
            border-radius: 15px 15px 5px 15px;
            padding: 12px 16px;
            margin: 8px 0;
            margin-left: 20%;
            border-left: 4px solid #2196f3;
        }
        .msg-bot {
            background: #f5f5f5;
            border-radius: 15px 15px 15px 5px;
            padding: 12px 16px;
            margin: 8px 0;
            margin-right: 20%;
            border-left: 4px solid #4caf50;
        }
        .msg-user strong {
            color: #1976d2;
        }
        .msg-bot strong {
            color: #388e3c;
        }
        .input-group {
            border-radius: 25px;
            overflow: hidden;
        }
        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 25px 0 0 25px;
            padding: 12px 20px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 0 25px 25px 0;
            padding: 12px 25px;
            font-weight: 500;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #5a6fd8 0%, #6a4190 100%);
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-connected {
            background-color: #4caf50;
            animation: pulse 2s infinite;
        }
        .status-disconnected {
            background-color: #f44336;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .typing-indicator {
            display: none;
            padding: 10px;
            font-style: italic;
            color: #666;
        }
    </style>
</head>
<body>
<div class="interview-container">
    <div class="card">
        <div class="card-header text-center">
            <h3 class="mb-0">
                <span class="status-indicator" id="status-indicator"></span>
                🎯 AI Mock Interview
            </h3>
            <small>Виртуальный технический интервьюер</small>
        </div>
        <div class="card-body">
            <div id="chat-box"></div>
            <div class="typing-indicator" id="typing-indicator">
                Интервьюер печатает...
            </div>
        </div>
        <div class="card-footer">
            <div class="row mb-3">
                <div class="col-md-6">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="enableTTS" checked>
                        <label class="form-check-label" for="enableTTS">
                            🔊 Озвучивать ответы интервьюера
                        </label>
                    </div>
                </div>
                <div class="col-md-6">
                    <select class="form-select form-select-sm" id="ttsModelSelect">
                        <option value="">Загружаем модели...</option>
                    </select>
                    <small class="text-muted">Выберите TTS модель</small>
                </div>
            </div>
            <div class="input-group">
                <input 
                    id="msg" 
                    type="text" 
                    class="form-control" 
                    placeholder="Введите ваш ответ..." 
                    onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendMsg();}"
                    disabled
                >
                <button class="btn btn-primary" onclick="sendMsg()" id="send-btn" disabled>
                    Отправить
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let ws = null;
let currentBotMsgDiv = null;
let currentBotMsgRaw = "";
let isConnected = false;
let audioQueue = [];
let isPlayingAudio = false;

function initWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const host = window.location.host;
    ws = new WebSocket(`${protocol}//${host}/ws/interview/`);
    
    ws.onopen = function(event) {
        isConnected = true;
        updateConnectionStatus();
        document.getElementById("msg").disabled = false;
        document.getElementById("send-btn").disabled = false;
    };
    
    ws.onmessage = function(event) {
        let data = JSON.parse(event.data);
        let chatBox = document.getElementById("chat-box");
        
        // Обработка аудио чанков
        if (data.audio_chunk) {
            console.log('Получен аудио чанк, размер:', data.audio_chunk.length);
            audioQueue.push(data.audio_chunk);
            if (!isPlayingAudio) {
                playNextAudio();
            }
            return;
        }
        
        if (data.answer_chunk === "END_OF_ANSWER") {
            if (currentBotMsgDiv) {
                currentBotMsgDiv.innerHTML = marked.parse(currentBotMsgRaw);
            }
            currentBotMsgDiv = null;
            currentBotMsgRaw = "";
            hideTypingIndicator();
            return;
        }
        
        if (!currentBotMsgDiv) {
            currentBotMsgDiv = document.createElement("div");
            currentBotMsgDiv.className = "msg-bot";
            chatBox.appendChild(currentBotMsgDiv);
            showTypingIndicator();
        }
        
        currentBotMsgRaw += data.answer_chunk;
        currentBotMsgDiv.innerHTML = marked.parse(currentBotMsgRaw);
        
        chatBox.scrollTop = chatBox.scrollHeight;
    };
    
    ws.onclose = function(event) {
        isConnected = false;
        updateConnectionStatus();
        document.getElementById("msg").disabled = true;
        document.getElementById("send-btn").disabled = true;
        
        setTimeout(() => {
            if (!isConnected) {
                initWebSocket();
            }
        }, 3000);
    };
    
    ws.onerror = function(error) {
        console.error('WebSocket error:', error);
        isConnected = false;
        updateConnectionStatus();
    };
}

function updateConnectionStatus() {
    const indicator = document.getElementById("status-indicator");
    if (isConnected) {
        indicator.className = "status-indicator status-connected";
    } else {
        indicator.className = "status-indicator status-disconnected";
    }
}

function showTypingIndicator() {
    document.getElementById("typing-indicator").style.display = "block";
}

function hideTypingIndicator() {
    document.getElementById("typing-indicator").style.display = "none";
}

function playNextAudio() {
    if (audioQueue.length === 0) {
        isPlayingAudio = false;
        console.log('Очередь аудио пуста');
        return;
    }
    
    isPlayingAudio = true;
    const audioBase64 = audioQueue.shift();
    console.log('Воспроизводим аудио, размер base64:', audioBase64.length);
    const audio = new Audio(`data:audio/wav;base64,${audioBase64}`);
    
    audio.onended = function() {
        console.log('Аудио закончено');
        playNextAudio();
    };
    
    audio.onerror = function(e) {
        console.error('Ошибка воспроизведения аудио:', e);
        playNextAudio();
    };
    
    audio.play().then(() => {
        console.log('Аудио запущено успешно');
    }).catch(e => {
        console.error('Ошибка запуска аудио:', e);
        playNextAudio();
    });
}

function sendMsg() {
    let msgInput = document.getElementById("msg");
    let msg = msgInput.value.trim();
    if (!msg || !isConnected) return;
    
    let chatBox = document.getElementById("chat-box");
    let userMsgDiv = document.createElement("div");
    userMsgDiv.className = "msg-user";
    userMsgDiv.innerHTML = `<strong>Вы:</strong> ${msg}`;
    chatBox.appendChild(userMsgDiv);
    
    let enableTTS = document.getElementById("enableTTS").checked;
    console.log('Отправляем сообщение с TTS:', enableTTS);
    ws.send(JSON.stringify({
        message: msg,
        enable_tts: enableTTS
    }));
    msgInput.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
    
    currentBotMsgDiv = null;
    currentBotMsgRaw = "";
}

async function loadTTSModels() {
    try {
        const response = await fetch('/api/tts-models/');
        if (response.ok) {
            const data = await response.json();
            const select = document.getElementById('ttsModelSelect');
            select.innerHTML = '';
            
            // Добавляем доступные модели
            for (const [key, model] of Object.entries(data.available_models)) {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = `${model.name} - ${model.description}`;
                select.appendChild(option);
            }
            
            // Выбираем текущую модель
            if (data.current_model && data.current_model.name) {
                select.value = data.current_model.name;
            }
            
            console.log('TTS модели загружены:', data);
        }
    } catch (error) {
        console.error('Ошибка загрузки TTS моделей:', error);
        document.getElementById('ttsModelSelect').innerHTML = '<option>Ошибка загрузки</option>';
    }
}

async function switchTTSModel(modelName) {
    try {
        const response = await fetch('/api/switch-tts-model/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({ model_name: modelName })
        });
        
        const data = await response.json();
        if (data.success) {
            console.log('Модель переключена:', data.message);
        } else {
            console.error('Ошибка переключения модели:', data.error);
        }
        return data.success;
    } catch (error) {
        console.error('Ошибка переключения модели:', error);
        return false;
    }
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

document.addEventListener('DOMContentLoaded', function() {
    initWebSocket();
    loadTTSModels();
    
    // Обработчик изменения модели
    document.getElementById('ttsModelSelect').addEventListener('change', async function(e) {
        const modelName = e.target.value;
        if (modelName) {
            console.log('Переключаем на модель:', modelName);
            const success = await switchTTSModel(modelName);
            if (!success) {
                alert('Не удалось переключить модель TTS');
                // Возвращаем к предыдущему значению
                loadTTSModels();
            }
        }
    });
});
</script>

</body>
</html>
