<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Mock Interview{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/chat.css' %}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'core:home' %}">
                🤖 AI Mock Interview
            </a>
            
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'core:home' %}">Главная</a>
                <a class="nav-link" href="{% url 'core:new_chat' %}">Новый чат</a>
                <a class="nav-link" href="{% url 'core:chat_sessions' %}">История</a>
                <a class="nav-link" href="/admin/">Админ</a>
            </div>
        </div>
    </nav>

    <main class="container-fluid p-0">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
